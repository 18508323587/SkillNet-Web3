version: '3.8'
services:
  # PostgreSQL: 存储课程、用户、兑换记录等持久化数据 [cite: 211, 213]
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: skillnet_admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: skillnet_db
    ports:
      - "5432:5432"

  # Redis: 存储心跳信号、防重放 nonce、缓存 [cite: 173, 208, 213]
  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"